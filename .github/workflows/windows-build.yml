name: Windows Build and Test

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest
    
    strategy:
      matrix:
        configuration: [Debug, Release]
      fail-fast: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'ga'

      - name: Restore dependencies
        run: dotnet restore Clean.Architecture.slnx

      - name: Build Full Template (${{ matrix.configuration }})
        run: dotnet build Clean.Architecture.slnx --configuration ${{ matrix.configuration }} --no-restore

      - name: Test Full Template (${{ matrix.configuration }})
        run: dotnet test Clean.Architecture.slnx --configuration ${{ matrix.configuration }} --no-build --verbosity normal --logger "trx;LogFileName=test-results-${{ matrix.configuration }}.trx"

      - name: Build MinimalClean Template (${{ matrix.configuration }})
        run: dotnet build MinimalClean/MinimalClean.Architecture.slnx --configuration ${{ matrix.configuration }} --no-restore

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-windows-${{ matrix.configuration }}
          path: '**/test-results-${{ matrix.configuration }}.trx'
          retention-days: 30
